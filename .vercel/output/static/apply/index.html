--><header class="sticky top-0 z-50 bg-white flex items-center justify-between px-12 py-4" id="main-header" style="transition: transform 0.35s ease;"><!-- LOGO --><a href="/" class="flex-shrink-0" aria-label="Initiate – Retour à l'accueil"><img src="/public/images/podcasts/INITIATE_logo_RVB.png" alt="Initiate" class="h-12 w-auto" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"><span id="logo-fallback" class="hidden items-center gap-2 text-i-navy font-bold text-lg" aria-hidden="true"><svg width="32" height="32" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="6" r="4" fill="#2BA8A4"></circle><circle cx="28" cy="12" r="3.5" fill="#2BA8A4" opacity=".8"></circle><circle cx="30" cy="23" r="3" fill="#2BA8A4" opacity=".6"></circle><circle cx="22" cy="30" r="2.5" fill="#2BA8A4" opacity=".5"></circle><circle cx="12" cy="30" r="2" fill="#9DC55A" opacity=".7"></circle><circle cx="6" cy="23" r="2.5" fill="#2BA8A4" opacity=".4"></circle><circle cx="8" cy="12" r="3" fill="#2BA8A4" opacity=".6"></circle></svg>initiate</span></a><!-- NAV DESKTOP --><nav class="hidden md:flex items-center" aria-label="Navigation principale"><ul class="flex items-center list-none m-0 p-0 gap-0"><li class="relative"><a href="/" class="px-3 py-1 text-sm transition-colors duration-200 text-i-navy hover:text-i-teal">Home</a></li><li aria-hidden="true"><span class="text-gray-300 text-xs select-none px-0.5">·</span></li><li class="relative"><div class="dropdown-wrapper"><button class="dropdown-btn flex items-center gap-1 px-3 py-1 text-sm transition-colors duration-200 bg-transparent border-0 cursor-pointer text-i-navy hover:text-i-teal" aria-haspopup="true" aria-expanded="false">Content<!-- Flèche bas : pivote à 180° quand ouvert --><svg class="dropdown-chevron transition-transform duration-200" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></button><!--

                --><ul class="dropdown-menu hidden absolute top-full left-0 mt-1 min-w-[160px] bg-white border border-gray-100 shadow-md rounded-md py-1 list-none m-0"><li><a href="/podcasts" class="block px-4 py-2 text-sm transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">Podcasts</a></li><li><a href="/publications" class="block px-4 py-2 text-sm transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">Publications</a></li></ul></div></li><li aria-hidden="true"><span class="text-gray-300 text-xs select-none px-0.5">·</span></li><li class="relative"><a href="/network" class="px-3 py-1 text-sm transition-colors duration-200 text-i-navy hover:text-i-teal">Network</a></li><li aria-hidden="true"><span class="text-gray-300 text-xs select-none px-0.5">·</span></li><li class="relative"><a href="/apply" aria-current="page" class="px-3 py-1 text-sm transition-colors duration-200 font-bold text-i-navy border-b-2 border-i-navy pb-0.5">Apply</a></li><li aria-hidden="true"><span class="text-gray-300 text-xs select-none px-0.5">·</span></li><li class="relative"><a href="/contact" class="px-3 py-1 text-sm transition-colors duration-200 text-i-navy hover:text-i-teal">Contact us</a></li><li aria-hidden="true"><span class="text-gray-300 text-xs select-none px-0.5">·</span></li><li class="relative"><a href="/faq" class="px-3 py-1 text-sm transition-colors duration-200 text-i-navy hover:text-i-teal">FAQ</a></li></ul></nav><!-- BOUTON BURGER (MOBILE) --><button id="burger-btn" class="md:hidden flex flex-col gap-1.5 p-2 -mr-2 bg-transparent border-0 cursor-pointer" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mobile-nav"><span id="bar1" class="block w-6 h-0.5 bg-i-navy" style="transition: transform 0.3s ease, opacity 0.3s ease;"></span><span id="bar2" class="block w-6 h-0.5 bg-i-navy" style="transition: opacity 0.3s ease;"></span><span id="bar3" class="block w-6 h-0.5 bg-i-navy" style="transition: transform 0.3s ease;"></span></button><!-- MENU MOBILE --><nav id="mobile-nav" class="absolute top-full left-0 right-0 bg-white border-t border-gray-100 shadow-md hidden" aria-label="Navigation mobile"><ul class="list-none m-0 py-3 px-0"><li><a href="/" class="block px-8 py-3 text-base transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">Home</a></li><li><div class="mobile-accordion"><button class="mobile-accordion-btn w-full flex items-center justify-between px-8 py-3 text-base bg-transparent border-0 cursor-pointer transition-colors duration-150 text-i-navy">Content<svg class="mobile-accordion-chevron transition-transform duration-200" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></button><!--
                Sous-items mobile : indentés à gauche (pl-12) pour
                marquer visuellement la hiérarchie sans ligne ou icône.
              --><ul class="mobile-accordion-menu hidden list-none m-0 p-0 bg-gray-50"><li><a href="/podcasts" class="block pl-12 pr-8 py-2.5 text-sm transition-colors duration-150 text-i-navy hover:text-i-teal">Podcasts</a></li><li><a href="/publications" class="block pl-12 pr-8 py-2.5 text-sm transition-colors duration-150 text-i-navy hover:text-i-teal">Publications</a></li></ul></div></li><li><a href="/network" class="block px-8 py-3 text-base transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">Network</a></li><li><a href="/apply" aria-current="page" class="block px-8 py-3 text-base transition-colors duration-150 font-bold text-i-teal">Apply</a></li><li><a href="/contact" class="block px-8 py-3 text-base transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">Contact us</a></li><li><a href="/faq" class="block px-8 py-3 text-base transition-colors duration-150 text-i-navy hover:text-i-teal hover:bg-gray-50">FAQ</a></li></ul></nav></header><script>
  (function () {

    /* ── BURGER MOBILE ─────────────────────────────────────── */
    const btn  = document.getElementById('burger-btn')
    const nav  = document.getElementById('mobile-nav')
    const bar1 = document.getElementById('bar1')
    const bar2 = document.getElementById('bar2')
    const bar3 = document.getElementById('bar3')

    let burgerOpen = false

    function openBurger() {
      burgerOpen = true
      nav.classList.remove('hidden')
      btn.setAttribute('aria-expanded', 'true')
      btn.setAttribute('aria-label', 'Fermer le menu')
      bar1.style.transform = 'translateY(8px) rotate(45deg)'
      bar2.style.opacity   = '0'
      bar3.style.transform = 'translateY(-8px) rotate(-45deg)'
    }

    function closeBurger() {
      burgerOpen = false
      nav.classList.add('hidden')
      btn.setAttribute('aria-expanded', 'false')
      btn.setAttribute('aria-label', 'Ouvrir le menu')
      bar1.style.transform = ''
      bar2.style.opacity   = '1'
      bar3.style.transform = ''
    }

    btn && btn.addEventListener('click', function () {
      burgerOpen ? closeBurger() : openBurger()
    })

    /* ── DROPDOWN DESKTOP ──────────────────────────────────────
       Clic sur le bouton "Content" : ouvre/ferme le sous-menu.
       Clic ailleurs sur la page : ferme tous les dropdowns.
    ─────────────────────────────────────────────────────────── */
    document.querySelectorAll('.dropdown-wrapper').forEach(function (wrapper) {
      const dropBtn  = wrapper.querySelector('.dropdown-btn')
      const dropMenu = wrapper.querySelector('.dropdown-menu')
      const chevron  = wrapper.querySelector('.dropdown-chevron')

      dropBtn && dropBtn.addEventListener('click', function (e) {
        e.stopPropagation() // évite que le clic remonte et referme immédiatement

        const isOpen = !dropMenu.classList.contains('hidden')

        // Ferme tous les autres dropdowns avant d'ouvrir celui-ci
        closeAllDropdowns()

        if (!isOpen) {
          dropMenu.classList.remove('hidden')
          dropBtn.setAttribute('aria-expanded', 'true')
          chevron && chevron.classList.add('rotate-180')
        }
      })
    })

    // Ferme les dropdowns au clic en dehors
    document.addEventListener('click', closeAllDropdowns)

    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-wrapper').forEach(function (w) {
        w.querySelector('.dropdown-menu')?.classList.add('hidden')
        w.querySelector('.dropdown-btn')?.setAttribute('aria-expanded', 'false')
        w.querySelector('.dropdown-chevron')?.classList.remove('rotate-180')
      })
    }

    /* ── ACCORDION MOBILE ──────────────────────────────────────
       Clic sur "Content" dans le menu burger : déplie les sous-items.
    ─────────────────────────────────────────────────────────── */
    document.querySelectorAll('.mobile-accordion').forEach(function (acc) {
      const accBtn     = acc.querySelector('.mobile-accordion-btn')
      const accMenu    = acc.querySelector('.mobile-accordion-menu')
      const accChevron = acc.querySelector('.mobile-accordion-chevron')

      accBtn && accBtn.addEventListener('click', function () {
        const isOpen = !accMenu.classList.contains('hidden')
        accMenu.classList.toggle('hidden', isOpen)
        accChevron && accChevron.classList.toggle('rotate-180', !isOpen)
      })
    })

    // Fermeture du burger au clic sur un lien simple du menu mobile
    nav && nav.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', closeBurger)
    })

  })();

  /* ── HIDE / SHOW NAVBAR AU SCROLL ─────────────────────────────
    Activé uniquement si data-nav-hide="true" sur le <body>.
    Mettre navHide={false} dans BaseLayout pour désactiver par page.

    Timings asymétriques :
    - Cacher  : 0.35s ease  (plus lent, moins intrusif)
    - Montrer : 0.18s ease  (plus rapide, réactif)

    Mouse-at-top : réapparition si souris < 20px du bord supérieur (PC).
  ─────────────────────────────────────────────────────────────── */
  (function () {
    const header = document.getElementById('main-header')
    if (!header) return

    // Lit la variable de contrôle posée par BaseLayout
    const hideEnabled = document.body.dataset.navHide === 'true'
    if (!hideEnabled) return

    let lastScroll = 0
    let isHidden = false

    function hideNav() {
      if (isHidden) return
      isHidden = true
      header.style.transition = 'transform 0.35s ease'
      header.style.transform = 'translateY(-100%)'
    }

    function showNav() {
      if (!isHidden) return
      isHidden = false
      header.style.transition = 'transform 0.18s ease'
      header.style.transform = 'translateY(0)'
    }

    // Scroll : cache vers le bas, montre vers le haut
    window.addEventListener('scroll', function () {
      const current = window.scrollY
      if (current > lastScroll && current > 80) {
        hideNav()
      } else {
        showNav()
      }
      lastScroll = current <= 0 ? 0 : current
    }, { passive: true })

    // Souris en haut de page → montre la navbar (PC uniquement)
    document.addEventListener('mousemove', function (e) {
      if (e.clientY < 20) showNav()
    })
  })()
</script><!--
    <slot /> : "trou" dans lequel Astro injecte le contenu de chaque page.

  --><main><div class="min-h-[calc(100vh-72px)] flex flex-col justify-center px-6 py-16"><div class="w-full max-w-md mx-auto"><!-- Titre : "Apply to" regular + "INITIATE" bold uppercase --><h1 class="text-i-navy text-center mb-10 leading-tight">Apply to<br><span class="uppercase tracking-wide">Initiate</span></h1><form action="#" class="flex flex-col gap-4"><input type="text" name="firstname" placeholder="First name" class="input-field" autocomplete="given-name"><input type="text" name="lastname" placeholder="Last name" class="input-field" autocomplete="family-name"><input type="email" name="email" placeholder="Email address" class="input-field" autocomplete="email"><!--
          ZONE UPLOAD CV
          <label> englobe l'<input type="file"> caché (sr-only).
          Cliquer n'importe où sur la zone déclenche le sélecteur de fichier.
          JS ci-dessous : au choix d'un fichier, la zone passe en état --done.
        --><label class="upload-zone" id="cv-zone"><!-- Icône document (état initial) --><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" class="flex-shrink-0" id="cv-icon-default"><rect x="4" y="2" width="12" height="16" rx="1.5" stroke="currentColor" stroke-width="1.5"></rect><line x1="7" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line><line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line><line x1="7" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line></svg><!-- Icône check (état done : caché par défaut) --><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" class="flex-shrink-0 hidden" id="cv-icon-done"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"></circle><polyline points="6.5,10.5 9,13 13.5,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg><span id="cv-label">Add your CV here</span><input type="file" name="cv" accept=".pdf,.doc,.docx" class="sr-only" id="cv-input"></label><!--
          ZONE UPLOAD LETTRE
          Même logique que le CV. Deux zones séparées pour deux fichiers distincts.
        --><label class="upload-zone" id="letter-zone"><!-- Icône check (état initial : même icône document) --><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" class="flex-shrink-0" id="letter-icon-default"><rect x="4" y="2" width="12" height="16" rx="1.5" stroke="currentColor" stroke-width="1.5"></rect><line x1="7" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line><line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line><line x1="7" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></line></svg><!-- Icône check (état done : caché par défaut) --><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" class="flex-shrink-0 hidden" id="letter-icon-done"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"></circle><polyline points="6.5,10.5 9,13 13.5,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg><span id="letter-label">Add your cover letter here</span><input type="file" name="letter" accept=".pdf,.doc,.docx" class="sr-only" id="letter-input"></label><!--
          Bouton submit centré, comme dans la maquette mobile.
          w-full sur mobile, auto sur desktop.
        --><button type="submit" class="btn-outline justify-center mt-4 md:self-center md:px-16">Candidate</button></form></div></div></main></body></html><script>
  (function () {

    // Formate un poids en octets → "234 KB", "1.2 MB", etc.
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B'
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB'
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
    }

    function setupUpload(inputId, zoneId, labelId, iconDefaultId, iconDoneId) {
      var input   = document.getElementById(inputId)
      var zone    = document.getElementById(zoneId)
      var label   = document.getElementById(labelId)
      var iconDef = document.getElementById(iconDefaultId)
      var iconDon = document.getElementById(iconDoneId)

      if (!input || !zone || !label) return

      input.addEventListener('change', function () {
        var file = input.files[0]
        if (!file) return

        // Nom tronqué + poids du fichier
        var name = file.name.length > 24
          ? file.name.substring(0, 21) + '…'
          : file.name
        var size = formatSize(file.size)

        // Affiche : "Mon CV.pdf  ·  234 KB"
        label.textContent = name + '  ·  ' + size

        // Passage en état "done" : bordure teal + texte teal
        zone.classList.add('upload-zone--done')

        // Swap icônes : document → check avec animation
        if (iconDef) iconDef.classList.add('hidden')
        if (iconDon) {
          iconDon.classList.remove('hidden')
          // Relance l'animation à chaque nouveau fichier
          iconDon.classList.remove('icon-check-animate')
          void iconDon.offsetWidth // force reflow pour reset l'animation
          iconDon.classList.add('icon-check-animate')
        }
      })
    }

    setupUpload('cv-input',     'cv-zone',     'cv-label',     'cv-icon-default',     'cv-icon-done')
    setupUpload('letter-input', 'letter-zone', 'letter-label', 'letter-icon-default', 'letter-icon-done')

  })()
</script>
